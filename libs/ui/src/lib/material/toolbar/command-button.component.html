<button
        mat-button
        class="button"
        [matTooltip]="tooltip"
        (click)="click()"
        [disabled]="!descriptor.enabled"
>
  <span class="content">
    <svg-icon *ngIf="descriptor.icon" [name]="descriptor.icon"></svg-icon>
    <span *ngIf="descriptor.label" class="label">
      {{ descriptor.label }}
    </span>
  </span>
</button>
