<div>
  <button matMenuTriggerFor]="menu" mat-button>
      <mat-icon>{{icon}}</mat-icon>
      <mat-icon iconPositionEnd>arrow_drop_down</mat-icon>
  </button>

  <mat-menu #menu="matMenu" class="dense-5">
    <button *ngFor="let command of commands"  (click)="command.run()" [disabled]="!command.enabled" mat-menu-item>{{command.label}}</button>
  </mat-menu>
</div>
