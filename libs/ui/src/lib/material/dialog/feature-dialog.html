<h2 mat-dialog-title>{{ data.title }}</h2>

<mat-dialog-content>
    <feature-outlet
            [feature]="data.dialog"
            (ready)="onInstance($event)">
    </feature-outlet>
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-button mat-raised-button *ngFor="let command of commands" (click)="onClick(command)"
            [color]="isDefault(command) ? 'primary' : 'basic'"
            [matTooltip]="tooltip(command)">
        {{command.label || (command.i18n! | translate)}}
    </button>
</mat-dialog-actions>
